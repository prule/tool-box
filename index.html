<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbox</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>Toolbox</h2>
            <ul>
                <li><a href="#" onclick="showTool('home')">Home</a></li>
                <li><a href="#" onclick="showTool('uuid-generator')">UUID Generator</a></li>
                <li><a href="#" onclick="showTool('timestamp-converter')">Timestamp Converter</a></li>
                <li><a href="#" onclick="showTool('timezone-converter')">Timezone Converter</a></li>
                <li><a href="#" onclick="showTool('squid-generator')">Squid Generator</a></li>
            </ul>
        </nav>
        <main class="content">
            <div id="tool-container">
                <h1>Welcome to Toolbox</h1>
                <p>Select a tool from the sidebar to get started.</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
