<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbox</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Load uuid library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js"></script>
    <!-- Load Marked.js for Markdown Preview -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Load Crypto-JS for Hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Load TinyColor for Color Conversion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinycolor/1.4.2/tinycolor.min.js"></script>
    <!-- Load Sqids for ID Generation -->
    <script src="https://cdn.jsdelivr.net/npm/sqids/dist/sqids.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>Toolbox</h2>
            <ul id="tool-list">
                <!-- Tool links will be dynamically added here -->
            </ul>
        </nav>
        <main class="content">
            <div id="tool-container">
                <h1>Welcome to Toolbox</h1>
                <p>Select a tool from the sidebar to get started.</p>
            </div>
        </main>
    </div>

    <!-- Core Application Logic -->
    <script src="toolbox/app.js"></script>

    <!-- Tool Scripts: Add new tools here -->
    <script src="toolbox/tools/uuid-generator.js"></script>
    <script src="toolbox/tools/timestamp-converter.js"></script>
    <script src="toolbox/tools/timezone-converter.logic.js"></script>
    <script src="toolbox/tools/timezone-converter.js"></script>
    <script src="toolbox/tools/sqids-generator.js"></script>
    <script src="toolbox/tools/base64-encoder.js"></script>
    <script src="toolbox/tools/url-encoder.js"></script>
    <script src="toolbox/tools/jwt-decoder.js"></script>
    <script src="toolbox/tools/json-formatter.js"></script>
    <script src="toolbox/tools/markdown-previewer.js"></script>
    <script src="toolbox/tools/case-converter.js"></script>
    <script src="toolbox/tools/counter.js"></script>
    <script src="toolbox/tools/hash-generator.js"></script>
    <script src="toolbox/tools/color-converter.js"></script>
    <script src="toolbox/tools/text-converter.js"></script>
</body>
</html>
